name: Build and Package ZIP

on:
  push:
    branches: [main] # Запускать при каждом обновлении основной ветки
  workflow_dispatch: # Позволяет запускать сборку вручную кнопкой

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Create ZIP archive
        run: |
          cd dist
          zip -r ../niva-site-ready.zip .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: niva-site-ready
          path: niva-site-ready.zip
