name: Build and Package ZIP

on:
  push:
    branches: [main]
  workflow_dispatch: # Позволяет запустить сборку кнопкой в любое время

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Create ZIP archive
        run: |
          # Переходим в папку dist, где лежит готовый сайт
          cd dist
          # Упаковываем всё содержимое этой папки в архив уровнем выше
          zip -r ../niva-site-ready.zip .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: niva-site-ready
          path: niva-site-ready.zip
          retention-days: 7
